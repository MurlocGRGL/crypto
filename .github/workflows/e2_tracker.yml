name: E2 Signal Tracker

on:
  schedule:
    # Every 15 minutes, UTC. GitHub Actions schedules run in UTC and may be
    # delayed by a few minutes under high load — this is expected behaviour.
    - cron: '*/15 * * * *'
  workflow_dispatch:   # allows manual trigger from the Actions tab

permissions:
  contents: write      # needed to commit the updated CSV back to the repo

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # kill the job if something hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements_tracker.txt

      - name: Install dependencies
        run: pip install -r requirements_tracker.txt

      - name: Run E2 tracker (single cycle)
        run: python e2_tracker.py --once

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_trading_log.csv
          # Only commit when there are actual changes
          git diff --staged --quiet || \
            git commit -m "tracker: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
